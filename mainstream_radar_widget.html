<!-- ════════════════════════════════════════════
     主流股雷達區塊 - 插入 dashboard.html 首頁置頂
     放在 <body> 最上方第一個 section 位置
     ════════════════════════════════════════════ -->

<!-- ══ CSS：加在 <style> 區塊末尾 ══ -->
<style>
/* ── 主流股雷達 ── */
.mainstream-radar {
    background: #0d1117;
    border: 1px solid #21262d;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
}
.mainstream-radar .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 8px;
}
.mainstream-radar .section-title {
    font-size: 18px;
    font-weight: 700;
    color: #e6edf3;
    display: flex;
    align-items: center;
    gap: 8px;
}
.mainstream-radar .section-title .badge {
    background: #1f6feb;
    color: #fff;
    font-size: 12px;
    padding: 2px 8px;
    border-radius: 12px;
    font-weight: 600;
}
.mainstream-radar .section-subtitle {
    color: #8b949e;
    font-size: 13px;
}
.mainstream-radar .update-time {
    color: #484f58;
    font-size: 12px;
}

/* 篩選/排序控制 */
.mainstream-controls {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
    align-items: center;
}
.mainstream-controls .ctrl-btn {
    background: #161b22;
    border: 1px solid #30363d;
    color: #8b949e;
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
}
.mainstream-controls .ctrl-btn.active,
.mainstream-controls .ctrl-btn:hover {
    border-color: #388bfd;
    color: #388bfd;
    background: #1c2d42;
}

/* 表格 */
.mainstream-table-wrap {
    overflow-x: auto;
}
.mainstream-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
}
.mainstream-table th {
    background: #161b22;
    color: #8b949e;
    padding: 8px 10px;
    text-align: center;
    font-weight: 600;
    border-bottom: 1px solid #21262d;
    white-space: nowrap;
    position: sticky;
    top: 0;
}
.mainstream-table th:nth-child(1),
.mainstream-table th:nth-child(2),
.mainstream-table th:nth-child(3) {
    text-align: left;
}
.mainstream-table td {
    padding: 9px 10px;
    border-bottom: 1px solid #161b22;
    vertical-align: middle;
    white-space: nowrap;
}
.mainstream-table tr:hover td {
    background: #161b22;
}
.mainstream-table .rank-col {
    color: #484f58;
    font-size: 12px;
    text-align: center;
    width: 32px;
}
.mainstream-table .stock-code {
    color: #58a6ff;
    font-weight: 600;
}
.mainstream-table .stock-name {
    color: #e6edf3;
    max-width: 80px;
    overflow: hidden;
    text-overflow: ellipsis;
}
.mainstream-table .price-col {
    color: #e6edf3;
    text-align: right;
}
.mainstream-table .change-up   { color: #f85149; text-align: right; }
.mainstream-table .change-down { color: #3fb950; text-align: right; }
.mainstream-table .change-flat { color: #8b949e; text-align: right; }
.mainstream-table .amount-col {
    color: #d29922;
    text-align: right;
    font-variant-numeric: tabular-nums;
}

/* 條件燈號 */
.cond-cell {
    text-align: center;
    min-width: 42px;
}
.cond-dot {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    font-size: 14px;
    cursor: default;
    position: relative;
}
.cond-dot.pass    { background: rgba(63,185,80,0.15); color: #3fb950; }
.cond-dot.fail    { background: rgba(248,81,73,0.12); color: #f85149; }
.cond-dot.unknown { background: rgba(139,148,158,0.1); color: #484f58; }

/* 手動勾選（條件5/6） */
.cond-manual {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
}
.cond-manual-btn {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 1.5px solid #30363d;
    background: transparent;
    cursor: pointer;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    color: #484f58;
}
.cond-manual-btn:hover { border-color: #58a6ff; }
.cond-manual-btn.marked-yes { background: rgba(63,185,80,0.2); border-color: #3fb950; color: #3fb950; }
.cond-manual-btn.marked-no  { background: rgba(248,81,73,0.15); border-color: #f85149; color: #f85149; }

/* 總分欄 */
.score-bar-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    min-width: 80px;
}
.score-num {
    font-weight: 700;
    font-size: 14px;
    min-width: 20px;
    text-align: right;
}
.score-num.high   { color: #3fb950; }
.score-num.mid    { color: #d29922; }
.score-num.low    { color: #8b949e; }
.score-bar {
    flex: 1;
    height: 6px;
    background: #21262d;
    border-radius: 3px;
    overflow: hidden;
}
.score-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.4s ease;
}
.score-bar-fill.high { background: #3fb950; }
.score-bar-fill.mid  { background: #d29922; }
.score-bar-fill.low  { background: #484f58; }

/* 主流股標籤 */
.mainstream-badge {
    background: linear-gradient(135deg, #1f6feb, #388bfd);
    color: #fff;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 700;
    letter-spacing: 0.5px;
}
.watching-badge {
    background: rgba(210,153,34,0.2);
    color: #d29922;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    border: 1px solid rgba(210,153,34,0.3);
}

/* 備註欄 */
.note-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid #21262d;
    color: #8b949e;
    font-size: 12px;
    width: 90px;
    padding: 2px 4px;
    outline: none;
}
.note-input:focus {
    border-bottom-color: #388bfd;
    color: #e6edf3;
}

/* 條件說明 tooltip hover */
.cond-header {
    cursor: help;
    border-bottom: 1px dashed #30363d;
}

/* 空狀態 */
.mainstream-empty {
    text-align: center;
    color: #484f58;
    padding: 40px;
    font-size: 14px;
}

/* 小螢幕 */
@media (max-width: 768px) {
    .mainstream-table .hide-mobile { display: none; }
    .mainstream-radar { padding: 14px; }
    .mainstream-table th, .mainstream-table td { padding: 7px 6px; }
}
</style>

<!-- ══ HTML：置頂區塊 ══ -->
<section class="mainstream-radar" id="mainstream-radar-section">
    <div class="section-header">
        <div>
            <div class="section-title">
                🎯 主流股雷達
                <span class="badge" id="mainstream-count-badge">0 檔</span>
            </div>
            <div class="section-subtitle">成交金額 TOP 30 × 6條主流條件篩選</div>
        </div>
        <div class="update-time" id="mainstream-update-time">載入中...</div>
    </div>
    
    <!-- 篩選控制 -->
    <div class="mainstream-controls">
        <span style="color:#484f58;font-size:12px;">顯示：</span>
        <button class="ctrl-btn active" onclick="filterMainstream('all')" id="filter-all">全部 TOP 30</button>
        <button class="ctrl-btn" onclick="filterMainstream('mainstream')" id="filter-mainstream">✅ 主流股</button>
        <button class="ctrl-btn" onclick="filterMainstream('watching')" id="filter-watching">👀 觀察中</button>
        <span style="color:#484f58;font-size:12px;margin-left:8px;">條件說明：滑鼠移到欄位標題</span>
    </div>
    
    <div class="mainstream-table-wrap">
        <table class="mainstream-table" id="mainstream-table">
            <thead>
                <tr>
                    <th>排</th>
                    <th>代號</th>
                    <th>名稱</th>
                    <th class="hide-mobile">股價</th>
                    <th class="hide-mobile">漲跌</th>
                    <th class="hide-mobile">金額(億)</th>
                    <th title="近5日是否連續出現在成交金額前30" class="cond-header">①連榜5日</th>
                    <th title="均量20是否持續翻揚（非一日衝量）" class="cond-header">②均量翻揚</th>
                    <th title="回檔時是否守住EMA10/EMA20" class="cond-header">③守EMA20</th>
                    <th title="外資或投信近5日是否持續買超" class="cond-header">④法人買超</th>
                    <th title="是否有明確基本面催化劑（非概念股）— 手動確認" class="cond-header">⑤基本面✏️</th>
                    <th title="類股中是否為領漲股（非跟漲）— 手動確認" class="cond-header">⑥領漲股✏️</th>
                    <th>分數</th>
                    <th class="hide-mobile">判定</th>
                    <th class="hide-mobile">備註</th>
                </tr>
            </thead>
            <tbody id="mainstream-tbody">
                <tr><td colspan="15" class="mainstream-empty">載入中...</td></tr>
            </tbody>
        </table>
    </div>
</section>

<!-- ══ JS：加在 </body> 前 ══ -->
<script>
// ── 主流股雷達 ──
let _mainstreamData = null;
let _mainstreamFilter = 'all';
let _mainstreamManual = {};  // 本地暫存人工標記

function loadMainstreamData() {
    const url = 'data/top_volume_stocks.json?v=' + Date.now();
    fetch(url)
        .then(r => r.ok ? r.json() : Promise.reject('not found'))
        .then(data => {
            _mainstreamData = data;
            // 還原本地儲存的手動標記
            try {
                const saved = localStorage.getItem('mainstream_manual');
                if (saved) _mainstreamManual = JSON.parse(saved);
            } catch(e) {}
            renderMainstreamTable();
        })
        .catch(e => {
            document.getElementById('mainstream-tbody').innerHTML =
                '<tr><td colspan="15" class="mainstream-empty">⚠ 尚無資料，待今日 19:00 後自動更新</td></tr>';
        });
}

function renderMainstreamTable() {
    if (!_mainstreamData) return;
    const data = _mainstreamData;
    
    // 更新標題
    document.getElementById('mainstream-update-time').textContent =
        '更新：' + (data.updated_at || '--');
    
    // 合併人工標記
    let stocks = data.stocks.map(s => {
        const m = _mainstreamManual[s.code] || {};
        const conds = Object.assign({}, s.conditions);
        if (m.cond5 !== undefined) conds.cond5_fundamental   = m.cond5;
        if (m.cond6 !== undefined) conds.cond6_sector_leader = m.cond6;
        // 重算分數
        const allConds = [conds.cond1_top30_5d, conds.cond2_vol_ma20,
                          conds.cond3_ema_support, conds.cond4_institutional,
                          conds.cond5_fundamental, conds.cond6_sector_leader];
        const totalPass = allConds.filter(c => c === true).length;
        return Object.assign({}, s, { conditions: conds, total_pass: totalPass,
                                       is_mainstream: totalPass >= 4 });
    });
    
    // 篩選
    if (_mainstreamFilter === 'mainstream') {
        stocks = stocks.filter(s => s.is_mainstream);
    } else if (_mainstreamFilter === 'watching') {
        stocks = stocks.filter(s => !s.is_mainstream && s.total_pass >= 2);
    }
    
    // 更新 badge
    const mainCount = _mainstreamData.stocks.filter(s => {
        const m = _mainstreamManual[s.code] || {};
        const conds = Object.assign({}, s.conditions);
        if (m.cond5 !== undefined) conds.cond5_fundamental   = m.cond5;
        if (m.cond6 !== undefined) conds.cond6_sector_leader = m.cond6;
        const allC = [conds.cond1_top30_5d, conds.cond2_vol_ma20,
                      conds.cond3_ema_support, conds.cond4_institutional,
                      conds.cond5_fundamental, conds.cond6_sector_leader];
        return allC.filter(c => c === true).length >= 4;
    }).length;
    document.getElementById('mainstream-count-badge').textContent = mainCount + ' 檔';
    
    // 渲染行
    const tbody = document.getElementById('mainstream-tbody');
    if (!stocks.length) {
        tbody.innerHTML = '<tr><td colspan="15" class="mainstream-empty">無符合條件的股票</td></tr>';
        return;
    }
    
    tbody.innerHTML = stocks.map(s => {
        const c = s.conditions;
        const chgRaw = parseFloat(s.change_pct) || 0;
        const chgClass = chgRaw > 0 ? 'change-up' : chgRaw < 0 ? 'change-down' : 'change-flat';
        const chgStr = chgRaw > 0 ? '+' + s.change_pct : s.change_pct;
        
        // 分數顏色
        const score = s.total_pass;
        const scoreClass = score >= 4 ? 'high' : score >= 2 ? 'mid' : 'low';
        const barPct = Math.round(score / 6 * 100);
        
        // 判定標籤
        const badge = s.is_mainstream
            ? '<span class="mainstream-badge">主流股</span>'
            : score >= 2
              ? '<span class="watching-badge">觀察中</span>'
              : '';
        
        // 備註
        const note = _mainstreamManual[s.code]?.note || s.note || '';
        
        return `<tr data-code="${s.code}" data-pass="${score}" data-mainstream="${s.is_mainstream}">
            <td class="rank-col">${s.rank}</td>
            <td class="stock-code">${s.code}</td>
            <td class="stock-name" title="${s.name}">${s.name}</td>
            <td class="price-col hide-mobile">${s.price || '--'}</td>
            <td class="${chgClass} hide-mobile">${chgStr || '--'}</td>
            <td class="amount-col hide-mobile">${s.amount_b ? s.amount_b.toFixed(1) : '--'}</td>
            ${renderCondCell(c.cond1_top30_5d, '①', s.conditions.details?.top30_days + '日上榜')}
            ${renderCondCell(c.cond2_vol_ma20,  '②', '均量MA20 趨勢')}
            ${renderCondCell(c.cond3_ema_support,'③', 'EMA20 ' + (c.details?.ema20 || '--'))}
            ${renderCondCell(c.cond4_institutional,'④',
                '外資買超' + (c.details?.foreign_buy_days||0) + '日 / 投信' + (c.details?.trust_buy_days||0) + '日')}
            <td class="cond-cell">${renderManualBtn(s.code, 5, c.cond5_fundamental)}</td>
            <td class="cond-cell">${renderManualBtn(s.code, 6, c.cond6_sector_leader)}</td>
            <td>
                <div class="score-bar-wrap">
                    <span class="score-num ${scoreClass}">${score}</span>
                    <div class="score-bar">
                        <div class="score-bar-fill ${scoreClass}" style="width:${barPct}%"></div>
                    </div>
                    <span style="color:#484f58;font-size:11px;">/6</span>
                </div>
            </td>
            <td class="hide-mobile">${badge}</td>
            <td class="hide-mobile">
                <input class="note-input" type="text" value="${escHtml(note)}"
                    placeholder="備註..." maxlength="30"
                    onchange="saveNote('${s.code}', this.value)"
                    onblur="saveNote('${s.code}', this.value)">
            </td>
        </tr>`;
    }).join('');
}

function renderCondCell(val, icon, tooltip) {
    if (val === true)  return `<td class="cond-cell"><span class="cond-dot pass"  title="${escHtml(tooltip)}">✓</span></td>`;
    if (val === false) return `<td class="cond-cell"><span class="cond-dot fail"  title="${escHtml(tooltip)}">✗</span></td>`;
    return                    `<td class="cond-cell"><span class="cond-dot unknown" title="無資料">?</span></td>`;
}

function renderManualBtn(code, condNum, currentVal) {
    const state = currentVal === true ? 'marked-yes' : currentVal === false ? 'marked-no' : '';
    const icon  = currentVal === true ? '✓' : currentVal === false ? '✗' : '?';
    return `<div class="cond-manual">
        <button class="cond-manual-btn ${state}" 
            onclick="toggleManual('${code}', ${condNum})"
            title="點擊切換：未知 → 是 → 否 → 未知">${icon}</button>
    </div>`;
}

function toggleManual(code, condNum) {
    if (!_mainstreamManual[code]) _mainstreamManual[code] = {};
    const key = 'cond' + condNum;
    const cur = _mainstreamManual[code][key];
    // 循環：undefined → true → false → undefined
    _mainstreamManual[code][key] = cur === undefined ? true : cur === true ? false : undefined;
    
    // 儲存到 localStorage
    try { localStorage.setItem('mainstream_manual', JSON.stringify(_mainstreamManual)); } catch(e){}
    
    // 同步回後端（非同步，失敗不影響顯示）
    syncManualToBackend(code);
    
    renderMainstreamTable();
}

function saveNote(code, val) {
    if (!_mainstreamManual[code]) _mainstreamManual[code] = {};
    _mainstreamManual[code].note = val;
    try { localStorage.setItem('mainstream_manual', JSON.stringify(_mainstreamManual)); } catch(e){}
}

function syncManualToBackend(code) {
    // 呼叫後端 API 把人工標記寫入 JSON
    // 如果你的後端有 API endpoint 可以在這裡加
    // 目前靠 localStorage 保留，重整頁面不丟失
}

function filterMainstream(type) {
    _mainstreamFilter = type;
    ['all','mainstream','watching'].forEach(t => {
        document.getElementById('filter-' + t)?.classList.toggle('active', t === type);
    });
    renderMainstreamTable();
}

function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// 頁面載入時執行
document.addEventListener('DOMContentLoaded', loadMainstreamData);
</script>
